codecov:
  require_ci_to_pass: true

coverage:
  status:
    project:
      default:
        target: auto
        threshold: 2%
        informational: true
    patch:
      default:
        target: 80%
        informational: true

# No cheeky PR comments — the badge + checks are enough.
comment: false

ignore:
  - "tests/**"
  - "docs/**"
  - "scripts/**"
  - "*.md"
