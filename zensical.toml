[project]
site_name = "Ariadne"
site_description = "A sensemaking harness for nonatomic entities — an agentic analytic interface over heterogeneous, multimodal data. Part of the SCADS program."
site_author = "AJ Barea"
site_url = "https://ajbarea.github.io/ariadne/"
repo_url = "https://github.com/ajbarea/ariadne"
repo_name = "ajbarea/ariadne"
copyright = "AJ Barea"

extra_css = ["style.css"]
extra_javascript = ["javascripts/reveal.js"]

# ---------------------------------------------------------------------------
# Navigation
# ---------------------------------------------------------------------------
nav = [
  { "Home" = "index.md" },
  { "Overview" = "overview.md" },
  { "Getting Started" = "getting-started.md" },
  { "Architecture" = [
      { "Overview" = "architecture/index.md" },
      { "Claude Agent SDK Reference" = "research/claude-agent-sdk-reference.md" },
  ]},
  { "Research" = [
      { "Overview" = "research/index.md" },
      { "Best-Practice Architecture (June 2026)" = "research/best-practice-architecture.md" },
      { "Claude Agent SDK Reference" = "research/claude-agent-sdk-reference.md" },
  ]},
  { "Conventions" = "conventions.md" },
  { "Roadmap" = "roadmap.md" },
]

# ---------------------------------------------------------------------------
# Theme & visuals
# ---------------------------------------------------------------------------
[project.theme]
name = "material"
language = "en"
custom_dir = "overrides"
icon.logo = "material/sitemap"
font.text = "Inter"
font.code = "JetBrains Mono"

features = [
    "announce.dismiss",
    "content.code.annotate",
    "content.code.copy",
    "content.code.select",
    "content.footnote.tooltips",
    "content.tabs.link",
    "content.tooltips",
    "navigation.footer",
    "navigation.indexes",
    "navigation.instant",
    "navigation.instant.prefetch",
    "navigation.path",
    "navigation.sections",
    "navigation.top",
    "navigation.tracking",
    "search.highlight",
    "search.suggest",
    "search.share",
]

[[project.theme.palette]]
scheme = "slate"
primary = "custom"
accent = "custom"

# ---------------------------------------------------------------------------
# Plugins
# ---------------------------------------------------------------------------
[project.plugins]
search = {}

# ---------------------------------------------------------------------------
# Social & metadata
# ---------------------------------------------------------------------------
[project.extra]
generator = false

[[project.extra.social]]
icon = "fontawesome/brands/github"
link = "https://github.com/ajbarea/ariadne"
name = "Ariadne on GitHub"
