[project]
site_name = "Ariadne"
site_description = "A sensemaking harness for nonatomic entities — an agentic analytic interface over heterogeneous, multimodal data. Part of the SCADS program."
site_author = "AJ Barea"
site_url = "https://ajbarea.github.io/ariadne/"
repo_url = "https://github.com/ajbarea/ariadne"
repo_name = "ajbarea/ariadne"
copyright = "AJ Barea"

extra_css = ["style.css"]
extra_javascript = ["javascripts/reveal.js"]

# ---------------------------------------------------------------------------
# Navigation
# ---------------------------------------------------------------------------
nav = [
  { "Home" = "index.md" },
  { "Overview" = "overview.md" },
  { "Getting Started" = "getting-started.md" },
  { "Architecture" = [
      { "Overview" = "architecture/index.md" },
      { "Claude Agent SDK Reference" = "research/claude-agent-sdk-reference.md" },
      { "Decisions" = [
          { "Decision log" = "architecture/decisions/index.md" },
          { "0001 · Claude Agent SDK" = "architecture/decisions/0001-orchestration-on-claude-agent-sdk.md" },
          { "0002 · Official MCP connectors" = "architecture/decisions/0002-official-mcp-connectors-over-hand-rolled.md" },
          { "0003 · postgres-mcp Restricted Mode" = "architecture/decisions/0003-postgres-mcp-restricted-mode.md" },
          { "0004 · Postgres over Redis" = "architecture/decisions/0004-postgres-over-redis-for-relational-store.md" },
          { "0005 · Defer subagent fan-out" = "architecture/decisions/0005-defer-subagent-fan-out.md" },
          { "0006 · Dataset-agnostic pipeline" = "architecture/decisions/0006-dataset-agnostic-pipeline.md" },
          { "0007 · Hybrid retrieval (full-text first)" = "architecture/decisions/0007-hybrid-retrieval-fulltext-first.md" },
          { "0008 · Multimodal: agentic-to-text" = "architecture/decisions/0008-multimodal-agentic-to-text-not-native-embeddings.md" },
          { "0009 · Distribute as MCP server + plugin" = "architecture/decisions/0009-distribute-as-mcp-server-and-plugin.md" },
          { "0010 · Observability (OpenTelemetry)" = "architecture/decisions/0010-observability-opentelemetry.md" },
          { "0011 · LLM-rubric analytic-standards eval" = "architecture/decisions/0011-llm-rubric-analytic-standards-eval.md" },
          { "0012 · Cloud vs. air-gapped fork" = "architecture/decisions/0012-cloud-vs-air-gapped-deployment-fork.md" },
      ]},
  ]},
  { "Workflow Patterns" = "patterns.md" },
  { "SCADS Integration" = "integration.md" },
  { "Research" = [
      { "Overview" = "research/index.md" },
      { "Best-Practice Architecture (June 2026)" = "research/best-practice-architecture.md" },
      { "Claude Agent SDK Reference" = "research/claude-agent-sdk-reference.md" },
  ]},
  { "Conventions" = "conventions.md" },
  { "Roadmap" = "roadmap.md" },
]

# ---------------------------------------------------------------------------
# Theme & visuals
# ---------------------------------------------------------------------------
[project.theme]
name = "material"
language = "en"
custom_dir = "overrides"
icon.logo = "material/sitemap"
font.text = "Inter"
font.code = "JetBrains Mono"

features = [
    "announce.dismiss",
    "content.code.annotate",
    "content.code.copy",
    "content.code.select",
    "content.footnote.tooltips",
    "content.tabs.link",
    "content.tooltips",
    "navigation.footer",
    "navigation.indexes",
    "navigation.instant",
    "navigation.instant.prefetch",
    "navigation.path",
    "navigation.sections",
    "navigation.top",
    "navigation.tracking",
    "search.highlight",
    "search.suggest",
    "search.share",
]

[[project.theme.palette]]
scheme = "slate"
primary = "custom"
accent = "custom"

# ---------------------------------------------------------------------------
# Plugins
# ---------------------------------------------------------------------------
[project.plugins]
search = {}

# ---------------------------------------------------------------------------
# Social & metadata
# ---------------------------------------------------------------------------
[project.extra]
generator = false

[[project.extra.social]]
icon = "fontawesome/brands/github"
link = "https://github.com/ajbarea/ariadne"
name = "Ariadne on GitHub"
