# Lint + test + read-only governance gate. Mirrors the fleet's pinned-SHA
# convention; jobs call the `make` targets so CI is the same gate as local.
name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    name: Lint (ruff + ty)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - name: Set up uv (with Python)
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          version: "0.11.5"
          python-version: "3.12"
          enable-cache: true
      - name: Install dependencies
        run: uv sync --locked --group dev
      - name: Lint (ruff format --check + ruff check + ty)
        run: make lint
      - name: Minimize uv cache
        if: always()
        run: uv cache prune --ci

  test:
    name: Tests (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13", "3.14"]
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - name: Set up uv (with Python)
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          version: "0.11.5"
          python-version: ${{ matrix.python-version }}
          enable-cache: true
          cache-suffix: py${{ matrix.python-version }}
      - name: Install dependencies
        run: uv sync --locked --group dev
      - name: Run unit + smoke tests (with branch coverage)
        run: uv run --no-active pytest -m "not integration and not slow" -n auto --cov --cov-branch --cov-report=xml
      - name: Upload coverage to Codecov
        if: matrix.python-version == '3.12'
        uses: codecov/codecov-action@e79a6962e0d4c0c17b229090214935d2e33f8354 # v6.0.1
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          slug: ajbarea/ariadne
          files: coverage.xml
          fail_ci_if_error: false
      - name: Minimize uv cache
        if: always()
        run: uv cache prune --ci

  governance:
    name: Read-only governance gate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - name: Set up uv (with Python)
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          version: "0.11.5"
          python-version: "3.12"
          enable-cache: true
      - name: Install dependencies
        run: uv sync --locked --group dev
      - name: Audit the sample workup's read-only contract (expect exit 0)
        run: uv run ariadne governance tests/fixtures/sample_workup
      - name: Minimize uv cache
        if: always()
        run: uv cache prune --ci
