# Canonical config: techne templates/dependabot.yml.example. /techne:sisters
# audits drift. ariadne: uv (Python deps) + github-actions (workflow SHAs).
version: 2

updates:
  - package-ecosystem: "uv"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    labels: ["dependencies"]
    # cooldown: hold new releases 7d (supply-chain); security updates bypass it.
    cooldown:
      default-days: 7
    commit-message:
      prefix: "chore(deps)"
      include: "scope"
    ignore:
      # HHEM-2.1-Open's trust_remote_code model targets the transformers 4.x API;
      # v5 breaks it (all_tied_weights_keys / tie_weights change, transformers#43646).
      # The `eval` extra pins transformers<5; lift when Vectara ships a v5 HHEM.
      - dependency-name: "transformers"
        update-types: ["version-update:semver-major"]
    groups:
      uv:
        patterns: ["*"]
        update-types: ["minor", "patch"]

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    labels: ["dependencies"]
    # SHA-pinned actions get version updates (not security alerts); cooldown holds
    # a freshly-published release 7 days so a compromise can surface before the bump.
    cooldown:
      default-days: 7
    commit-message:
      prefix: "ci(deps)"
      include: "scope"
    groups:
      github-actions:
        patterns: ["*"]
        update-types: ["minor", "patch"]
